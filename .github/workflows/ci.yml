name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # "Rebase and merge" rewrites the committer, so the commit that lands on main gets a fresh SHA even when
  # its tree (the file snapshot) and parent are identical to the PR head CI already validated -- matching on
  # the commit SHA therefore never skips. This gate matches on the tree instead: on push only, if a
  # pull_request CI run already passed for a commit with the same tree, the result is guaranteed identical,
  # so it skips the heavy jobs below. The gate itself still succeeds, so release.yml's wait for a green
  # ci.yml run on the commit still holds. A merge rebased onto a moved main (different tree) and direct
  # pushes to main match no prior tree, so the full suite runs. The gate runs only on push, so pull_request
  # CI is never delayed by it.
  gate:
    name: Gate (skip if this tree already passed CI)
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide whether the heavy jobs should run
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo="${{ github.repository }}"
          tree=$(gh api "repos/$repo/git/commits/${{ github.sha }}" --jq '.tree.sha' 2>/dev/null || true)
          if [ -z "$tree" ]; then
            echo "Could not resolve the tree for ${{ github.sha }}; running the full suite."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Distinct head SHAs of recent successful pull_request CI runs, most-recent first (so a just-merged
          # PR matches on the first iteration). The PR head commit stays fetchable as refs/pull/<n>/head.
          candidates=$(gh api \
            "repos/$repo/actions/workflows/ci.yml/runs?status=success&event=pull_request&per_page=50" \
            --jq '.workflow_runs[].head_sha' 2>/dev/null | awk 'NF && !seen[$0]++' || true)
          for sha in $candidates; do
            t=$(gh api "repos/$repo/git/commits/$sha" --jq '.tree.sha' 2>/dev/null || true)
            if [ -n "$t" ] && [ "$t" = "$tree" ]; then
              echo "Tree $tree already passed CI via pull-request commit $sha; skipping the heavy jobs."
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No prior passing run for tree $tree; running the full suite."
          echo "run=true" >> "$GITHUB_OUTPUT"

  # FreeBSD shares its BSD platform path (kqueue, BPF, route sockets, getifaddrs) with macOS but needs a
  # real FreeBSD kernel to run -- Docker can't provide one, and qemu-user translates architecture, not OS.
  # So: cross-compile on the runner (rustup std; clang+lld against a sysroot from the official base.txz,
  # ci/freebsd-sysroot.sh), boot the official FreeBSD image under QEMU (ci/freebsd-vm.sh), and run every
  # test binary in it as root through cargo's target runner (ci/freebsd-ssh-runner.sh) -- privileged
  # tests run instead of skipping. amd64 rides KVM; arm64 has no KVM on any GitHub runner, so its guest
  # runs under TCG -- compilation stays native-speed on the runner, only test execution is emulated --
  # and builds with the pinned nightly from ci/freebsd-nightly.env until stable 1.98 ships the target's std.
  # One VM per lane, the same debug/release split as the native test lanes; the release lanes test the
  # shipped +crt-static configuration (kept off host proc-macros by the target-scoped rustflags).
  # Everything fetched is FreeBSD-project-official and hash-pinned.
  freebsd-tests:
    name: Test (freebsd${{ matrix.os }}-${{ matrix.arch.name }}, ${{ matrix.profile.name }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      FREEBSD_VM_ARCH: ${{ matrix.arch.name }}
      FREEBSD_VM_VERSION: ${{ matrix.os }}
      FREEBSD_SYSROOT_ARCH: ${{ matrix.arch.name }}
      # Dynamic rows link against the sysroot of the release they run on; release-static rows
      # always use the 14 baseline, because they test the shipped asset configuration
      # (release.yml links against the 14 pin) wherever it lands.
      FREEBSD_SYSROOT_VERSION: ${{ matrix.profile.name == 'release-static' && '14' || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Both pinned majors: 14 is the release baseline, 15 is what OPNsense 26.7 (and soon most
        # deployments) runs. The daemon's kernel surface (kqueue, BPF, routing) is where majors
        # actually diverge - FreeBSD 15 dropped the broadcast connect the e2e harness relied on.
        os: [14, 15]
        arch:
          - { name: amd64, triple: x86_64-unknown-freebsd, kvm: true, packages: qemu-system-x86 }
          - { name: arm64, triple: aarch64-unknown-freebsd, kvm: false, packages: qemu-system-arm qemu-efi-aarch64 }
        profile:
          - { name: debug, flags: '', rustflags: '' }
          - { name: release, flags: '--release', rustflags: '' }
          - { name: release-static, flags: '--release', rustflags: '-C target-feature=+crt-static' }
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-freebsd${{ matrix.os }}-${{ matrix.arch.name }}-${{ matrix.profile.name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-freebsd${{ matrix.os }}-${{ matrix.arch.name }}-${{ matrix.profile.name }}-
      - name: Install clang, lld + QEMU
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends clang lld qemu-utils genisoimage ${{ matrix.arch.packages }}
      # /dev/kvm exists on the runner but is root:kvm 0660; GitHub's documented udev recipe opens it
      # (a group add wouldn't apply to the already-running session).
      - name: Enable KVM
        if: matrix.arch.kvm
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Launch first so the VM boots while the sysroot downloads and the build runs.
      - name: Launch the FreeBSD VM
        run: ci/freebsd-vm.sh launch
      # aarch64-unknown-freebsd has no stable dist until 1.98: those lanes install the pinned
      # dated nightly from ci/freebsd-nightly.env instead of the rust-toolchain.toml stable, and every
      # later rustc/cargo call picks it up through the FREEBSD_TOOLCHAIN selector set here.
      - name: Add the Rust target
        run: |
          . ci/freebsd-nightly.env
          if [ '${{ matrix.arch.name }}' = arm64 ]; then
            rustup toolchain install "nightly-${RUST_NIGHTLY}" --profile minimal
            rustup target add --toolchain "nightly-${RUST_NIGHTLY}" aarch64-unknown-freebsd
            echo "FREEBSD_TOOLCHAIN=+nightly-${RUST_NIGHTLY}" >> "$GITHUB_ENV"
          else
            rustup target add x86_64-unknown-freebsd
          fi
      - name: FreeBSD link sysroot
        run: ci/freebsd-sysroot.sh
      - name: Show toolchain
        run: rustc ${FREEBSD_TOOLCHAIN:-} -V && cargo ${FREEBSD_TOOLCHAIN:-} -V
      - name: Wait for the VM
        run: ci/freebsd-vm.sh wait
      - name: cargo test
        run: |
          triple='${{ matrix.arch.triple }}'
          prefix="CARGO_TARGET_$(echo "$triple" | tr 'a-z-' 'A-Z_')"
          export "${prefix}_LINKER=$HOME/freebsd-sysroot/bin/freebsd-clang"
          export "${prefix}_RUNNER=$PWD/ci/freebsd-ssh-runner.sh"
          export "${prefix}_RUSTFLAGS=${{ matrix.profile.rustflags }}"
          cargo ${FREEBSD_TOOLCHAIN:-} test --locked --target "$triple" ${{ matrix.profile.flags }}
      - name: VM console log
        if: failure()
        run: ci/freebsd-vm.sh console

  # The native e2e suite on a real FreeBSD kernel: epair segments, every participant in its own
  # vnet jail -- the BPF capture/inject and PF_ROUTE monitor paths end to end, which no Linux lane
  # can reach. Same harness as the freebsd-tests job: cross-build on the runner, the VM only
  # executes; python3 comes from pkg (first-party FreeBSD infrastructure) over the VM's NATed
  # network, and the suite + binary ride in over scp. The arm64 guest runs everything (daemon,
  # jails, probes) under TCG; the suite mostly waits on wall-clock timers, so emulation adds little.
  freebsd-native-e2e:
    name: Native e2e (freebsd${{ matrix.os }}-${{ matrix.arch.name }}, ${{ matrix.linkage.name }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      FREEBSD_VM_ARCH: ${{ matrix.arch.name }}
      FREEBSD_VM_VERSION: ${{ matrix.os }}
      FREEBSD_SYSROOT_ARCH: ${{ matrix.arch.name }}
      # Dynamic rows link against the sysroot of the release they run on (the port's
      # configuration is built ON its target); static rows keep the 14 baseline the release
      # assets are linked against.
      FREEBSD_SYSROOT_VERSION: ${{ matrix.linkage.name == 'static' && '14' || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Same version axis as freebsd-tests: the e2e suite exercises the kernel surface
        # (epair, vnet, BPF, PF_ROUTE) where the majors actually differ.
        os: [14, 15]
        arch:
          - { name: amd64, triple: x86_64-unknown-freebsd, kvm: true, packages: qemu-system-x86 }
          - { name: arm64, triple: aarch64-unknown-freebsd, kvm: false, packages: qemu-system-arm qemu-efi-aarch64 }
        # Both linkages, because they behave differently at runtime (the static-only environ
        # crash), and each is shipped: static as the release assets, dynamic as the FreeBSD port.
        # Cross-built from PR source either way; the VM only executes.
        linkage:
          - { name: static, rustflags: '-C target-feature=+crt-static' }
          - { name: dynamic, rustflags: '' }
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-freebsd${{ matrix.os }}-e2e-${{ matrix.arch.name }}-${{ matrix.linkage.name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-freebsd${{ matrix.os }}-e2e-${{ matrix.arch.name }}-${{ matrix.linkage.name }}-
      - name: Install clang, lld + QEMU
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends clang lld qemu-utils genisoimage ${{ matrix.arch.packages }}
      - name: Enable KVM
        if: matrix.arch.kvm
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Launch first so the VM boots while the sysroot downloads and the build runs.
      - name: Launch the FreeBSD VM
        run: ci/freebsd-vm.sh launch
      # aarch64-unknown-freebsd has no stable dist until 1.98: that lane installs the pinned
      # dated nightly from ci/freebsd-nightly.env instead of the rust-toolchain.toml stable, and every
      # later cargo call picks it up through the FREEBSD_TOOLCHAIN selector set here.
      - name: Add the Rust target
        run: |
          . ci/freebsd-nightly.env
          if [ '${{ matrix.arch.name }}' = arm64 ]; then
            rustup toolchain install "nightly-${RUST_NIGHTLY}" --profile minimal
            rustup target add --toolchain "nightly-${RUST_NIGHTLY}" aarch64-unknown-freebsd
            echo "FREEBSD_TOOLCHAIN=+nightly-${RUST_NIGHTLY}" >> "$GITHUB_ENV"
          else
            rustup target add x86_64-unknown-freebsd
          fi
      - name: FreeBSD link sysroot
        run: ci/freebsd-sysroot.sh
      - name: Show toolchain
        run: rustc ${FREEBSD_TOOLCHAIN:-} -V && cargo ${FREEBSD_TOOLCHAIN:-} -V
      - name: Build the release binary
        run: |
          triple='${{ matrix.arch.triple }}'
          prefix="CARGO_TARGET_$(echo "$triple" | tr 'a-z-' 'A-Z_')"
          export "${prefix}_LINKER=$HOME/freebsd-sysroot/bin/freebsd-clang"
          export "${prefix}_RUSTFLAGS=${{ matrix.linkage.rustflags }}"
          cargo ${FREEBSD_TOOLCHAIN:-} build --release --locked --target "$triple"
      - name: Wait for the VM
        run: ci/freebsd-vm.sh wait
      - name: Install python3 in the VM
        run: ci/freebsd-vm.sh run 'pkg install -y python3 && python3 --version'
      - name: Run the e2e suite in the VM
        run: |
          ci/freebsd-vm.sh run 'mkdir -p /root/netflector'
          ci/freebsd-vm.sh push e2e target/${{ matrix.arch.triple }}/release/netflector /root/netflector/
          ci/freebsd-vm.sh run 'cd /root/netflector && python3 e2e/run.py --backend native --binary ./netflector'
      - name: VM console log
        if: failure()
        run: ci/freebsd-vm.sh console

  # Build the port the way FreeBSD would, so a broken port is caught here and not by a reviewer (or by
  # the package cluster, months later). The QA targets are the ones a ports committer runs: portlint,
  # stage-qa (shebangs, stripping, dependencies) and check-plist (installed-but-unlisted files).
  #
  # The ports tree is checked out at the exact commit the installed packages were built from, which every
  # package records in ports_top_git_hash. Chasing a branch instead means the tree's lang/rust can be
  # newer than the rust package, the dependency looks unsatisfied, and the build quietly starts compiling
  # the Rust compiler from source for hours.
  freebsd-port-build:
    name: Port builds and runs on FreeBSD ${{ matrix.os }}
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      FREEBSD_VM_ARCH: amd64
      FREEBSD_VM_VERSION: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # amd64 only (KVM): an arm64 port build would run rustc under TCG (no KVM on any
        # GitHub runner for aarch64 guests), which a timing experiment put far beyond a
        # tolerable PR wait -- the same work is ~4 minutes under hardware virt. The publish
        # workflows own arm64.
        os: [14, 15]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install QEMU
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86 genisoimage
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Launch the FreeBSD VM
        run: ci/freebsd-vm.sh launch
      - name: Wait for the VM
        run: ci/freebsd-vm.sh wait
      - name: Ports tree, pinned to the commit our packages were built from
        # shellcheck disable=SC2016  # the single quotes are the point: $hash expands in the guest
        run: |
          ci/freebsd-vm.sh run 'pkg install -y git rust ports-mgmt/portlint'
          ci/freebsd-vm.sh run '
            set -e
            hash=$(pkg info -A rust | sed -n "s/.*ports_top_git_hash:[[:space:]]*//p")
            [ -n "$hash" ] || { echo "rust package records no ports_top_git_hash"; exit 1; }
            echo "ports tree at $hash (the commit our rust package was built from)"
            mkdir -p /usr/ports && cd /usr/ports
            git init -q .
            git remote add origin https://git.FreeBSD.org/ports.git
            git fetch -q --depth 1 origin "$hash"
            git checkout -q FETCH_HEAD
            [ "$(git rev-parse HEAD)" = "$hash" ] || { echo "tree is not at the pinned commit"; exit 1; }
          '
      - name: Install the port into the tree
        run: |
          ci/freebsd-vm.sh push dist/freebsd/net/netflector /usr/ports/net/netflector
          # net/Makefile's SUBDIR list is a deliverable of the submission, and portlint checks it.
          ci/freebsd-vm.sh run 'cd /usr/ports/net && awk "/^ *SUBDIR \+= / && !ins && \$3 > \"netflector\" { print \"    SUBDIR += netflector\"; ins = 1 } { print } END { if (!ins) print \"    SUBDIR += netflector\" }" Makefile > Makefile.new && mv Makefile.new Makefile && grep -n "SUBDIR += netflector" Makefile'
      - name: portlint
        run: |
          ci/freebsd-vm.sh run 'cd /usr/ports && git add -f net/netflector net/Makefile'
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && portlint -AC'
      - name: Build, and run the QA a ports committer runs
        run: |
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make stage'
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make stage-qa'
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make check-plist'
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make package'
      - name: Install and run
        run: |
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make install'
          ci/freebsd-vm.sh run '/usr/local/bin/netflector --version'
          # The rc script must refuse a configuration the daemon would reject, rather than launching a
          # service that dies a second later.
          ci/freebsd-vm.sh run 'sysrc netflector_enable=YES'
          ci/freebsd-vm.sh run 'printf "[reflectors.bad]\nsource_if = \"em0\"\ntarget_if = \"em0\"\nmdns = true\n" > /usr/local/etc/netflector.toml'
          ci/freebsd-vm.sh run 'service netflector start 2>&1 | grep -q "refusing to start" && echo "rc refused an invalid configuration"'
          ci/freebsd-vm.sh run 'rm /usr/local/etc/netflector.toml'
      # The port's binary is the one configuration no other lane executes end to end: release
      # profile, dynamically linked, built by the ports framework from the release tarball. Run
      # the full native e2e suite against the INSTALLED binary before deinstalling it.
      - name: Native e2e against the installed port binary
        run: |
          ci/freebsd-vm.sh run 'pkg install -y python3'
          ci/freebsd-vm.sh run 'mkdir -p /root/netflector'
          ci/freebsd-vm.sh push e2e /root/netflector/
          ci/freebsd-vm.sh run 'cd /root/netflector && python3 e2e/run.py --backend native --binary /usr/local/bin/netflector'
      - name: Deinstall
        run: |
          ci/freebsd-vm.sh run 'cd /usr/ports/net/netflector && make deinstall'
      - name: Console on failure
        if: failure()
        run: ci/freebsd-vm.sh console

  # The e2e suite with netflector under Valgrind memcheck (the runtime-valgrind image: a glibc release
  # binary with debug symbols). run.py --valgrind SIGTERMs the daemon per case so Valgrind runs its leak
  # analysis at a clean exit; --error-exitcode=1 fails on any leak, leaked fd, or memcheck error.
  # --skip-build reuses the image built here.
  valgrind-e2e:
    name: Valgrind e2e
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build runtime-valgrind image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime-valgrind
          tags: netflector:e2e-valgrind
          load: true
          cache-from: type=gha,scope=valgrind
          cache-to: type=gha,mode=max,scope=valgrind
      - name: Run e2e under Valgrind memcheck
        run: python3 e2e/run.py --valgrind --skip-build

  # Build the scratch image and drive the Docker-bridge e2e suite (the data path: capture -> reflect across
  # two bridges, multi-protocol). One lane per shipped 64-bit image arch, each on its native runner, so
  # both released layer sets are executed in exactly the configuration release.yml publishes (native =
  # default-toolchain link, per the Dockerfile). The cache scopes match the release image jobs', so a
  # release build reuses layers CI built for the same commit. --skip-build reuses the image built here.
  docker-e2e:
    name: Docker e2e (${{ matrix.arch.name }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: amd64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build netflector image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          tags: netflector:e2e
          load: true
          cache-from: type=gha,scope=${{ matrix.arch.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch.name }}
      - name: Run e2e
        run: python3 e2e/run.py --skip-build --image netflector:e2e

  # The same e2e suite without Docker: netns + veth segments and plain processes. The glibc lanes
  # run a release binary built directly on the runner -- the from-source configuration. The 64-bit
  # musl lanes run the shipped release-asset configuration: static musl, rustc's default
  # toolchain, built and run natively. The 32-bit ARM lanes run that shipped configuration too,
  # lld-cross-linked like the Dockerfile's cross layers, with the daemon executing under qemu-user
  # via binfmt_misc: the harness, probes, and every kernel primitive (netns, veth, AF_PACKET,
  # netlink) are native; only netflector is emulated. That puts real 32-bit pointer-width
  # traffic through the whole capture -> classify -> re-emit path, which the QEMU unit-test lanes
  # can't (unit-only) and the docker-e2e lanes can't (64-bit images).
  native-e2e:
    name: Native e2e (${{ matrix.target.name }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # triple '' = the runner's native gnu toolchain; a triple without `emulated` is that musl
        # target built and run natively; `emulated` lanes cross-link and run under qemu binfmt.
        target:
          - { name: linux-amd64-glibc, runner: ubuntu-24.04, triple: '' }
          - { name: linux-arm64-glibc, runner: ubuntu-24.04-arm, triple: '' }
          - { name: linux-amd64-musl, runner: ubuntu-24.04, triple: x86_64-unknown-linux-musl }
          - { name: linux-arm64-musl, runner: ubuntu-24.04-arm, triple: aarch64-unknown-linux-musl }
          - { name: linux-armv7-musl, runner: ubuntu-24.04, triple: armv7-unknown-linux-musleabihf, emulated: true }
          - { name: linux-armv5-musl, runner: ubuntu-24.04, triple: armv5te-unknown-linux-musleabi, emulated: true }
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-native-e2e-${{ matrix.target.name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-native-e2e-${{ matrix.target.name }}-
      - name: Install lld + QEMU user-mode
        if: matrix.target.emulated
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends lld qemu-user-binfmt
      - name: Add the Rust target
        if: matrix.target.triple != ''
        run: rustup target add ${{ matrix.target.triple }}
      # The same lld cross-link config the Dockerfile writes for cross layers; binfmt_misc (from
      # qemu-user-binfmt) execs the ARM binary under qemu transparently, netns exec included. The
      # native musl lanes write no config: rustc's default toolchain, like release.yml's rows.
      - name: Configure the arm32 cross-linker
        if: matrix.target.emulated
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.'cfg(target_env = "musl")']
          linker = "ld.lld"
          rustflags = ["-C", "linker-flavor=ld.lld"]
          EOF
      - name: Show toolchain
        run: rustc -V && cargo -V
      - name: Build release binary
        run: |
          triple='${{ matrix.target.triple }}'
          cargo build --release --locked ${triple:+--target "$triple"}
      - name: Run e2e natively
        run: |
          triple='${{ matrix.target.triple }}'
          sudo python3 e2e/run.py --backend native --binary "target/${triple:+$triple/}release/netflector"

  # The unit suite under Miri, for every shipped target. Valgrind (below) catches accesses that are
  # actually invalid; it is blind to UB that performs no invalid access -- an unaligned read the hardware
  # tolerates, or a raw pointer used after a &mut reborrow invalidated its provenance. Both live in our
  # unsafe: read_unaligned casts into netlink/BPF byte buffers, StreamBuffer's MaybeUninit tail. Miri
  # interprets the abstract machine and checks the alignment/aliasing/provenance rules instead, so it
  # covers the class memcheck can't.
  #
  # Miri can't call foreign functions, so a test needing a real socket, capture device, poll backend,
  # interface or signal handler is gated with cfg_attr(miri, ignore = "what it needs"). Everything else
  # runs unfiltered, so a new test is covered by default and one that reaches the kernel fails until it is
  # gated. A name-filtered allowlist would go stale silently instead.
  #
  # Miri interprets rather than executes, so --target needs no toolchain, emulator or VM for that OS: this
  # one ubuntu runner covers the BSD-only cfg code and the 32-bit ARM layouts (where an alignment bug in
  # the parsers would surface) as well as its own. It needs no privileges either -- Miri's geteuid is a
  # constant, so the root-gated tests always take their skip branch.
  #
  # Toolchain: the latest nightly that ships Miri, resolved per run rather than pinned, so the lane picks
  # up tightened checks (Tree Borrows) and new shims as they land. Not every nightly ships the component
  # (it is gated on Miri's own tests passing), so plain `nightly` fails on a day Miri didn't build, which
  # would red every PR for an unrelated reason; rust-lang's components-history serves the most recent date
  # that did ship it, so float on that. The cost: a Miri or rustc regression can red this lane on an
  # unrelated PR. When Miri gains a shim for something we gate on (kqueue, say), the cfg_attr still has to
  # be deleted by hand; the lane just makes that possible.
  miri:
    name: Miri (${{ matrix.target }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - armv5te-unknown-linux-musleabi
          - x86_64-unknown-freebsd
          - aarch64-unknown-freebsd
          - aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Resolve the newest nightly that ships Miri
        run: |
          date=$(curl -fsSL --retry 5 --retry-all-errors https://rust-lang.github.io/rustup-components-history/x86_64-unknown-linux-gnu/miri)
          # The endpoint serves a bare date. Anything else (an error page, an outage) must fail here
          # rather than turn into a confusing rustup error two steps later.
          case "$date" in
            20[0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
            *) echo "::error::expected a nightly date, got: $date"; exit 1 ;;
          esac
          echo "MIRI_TOOLCHAIN=nightly-$date" >> "$GITHUB_ENV"
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          # ~/.cache/miri holds the per-target sysroot Miri builds from rust-src; without it every run
          # recompiles std for the target. The toolchain is in the key because a new nightly needs a new
          # sysroot; the second restore-key still reuses the previous day's registry and target dir.
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cache/miri
            target
          key: cargo-miri-${{ matrix.target }}-${{ env.MIRI_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-miri-${{ matrix.target }}-${{ env.MIRI_TOOLCHAIN }}-
            cargo-miri-${{ matrix.target }}-
      - name: Install the Miri toolchain
        run: rustup toolchain install "$MIRI_TOOLCHAIN" --profile minimal --component miri,rust-src
      - name: Show toolchain
        run: rustc "+$MIRI_TOOLCHAIN" -V && cargo "+$MIRI_TOOLCHAIN" miri -V
      # Both aliasing models: Stacked Borrows is today's default, Tree Borrows the successor, and each
      # accepts things the other rejects, so code sound under both stays sound whichever one rustc settles
      # on. That matters for unsafe holding raw pointers into buffers it also hands out as &mut
      # (StreamBuffer's tail, the parsers). -Zmiri-strict-provenance rejects int-to-pointer casts that
      # launder provenance away, a hazard in FFI glue: it keeps kqueue's udata round-trip on
      # ptr::without_provenance_mut.
      # The two runs share the sysroot, so the second only re-interprets the suite.
      - name: cargo miri test (stacked borrows)
        env:
          MIRIFLAGS: -Zmiri-strict-provenance
        run: cargo "+$MIRI_TOOLCHAIN" miri test --locked --target ${{ matrix.target }} --lib
      - name: cargo miri test (tree borrows)
        env:
          MIRIFLAGS: -Zmiri-tree-borrows -Zmiri-strict-provenance
        run: cargo "+$MIRI_TOOLCHAIN" miri test --locked --target ${{ matrix.target }} --lib

  # The unit suite in both profiles, per OS/arch/libc. The glibc lanes (triple '') cover the
  # from-source configuration -- what `cargo build` gives users and contributors, rustc's default
  # toolchain included; macOS among them exercises the cfg(macos) BSD path. The 64-bit musl lanes
  # run the shipped-binary configuration (static musl, rustc's default self-contained link, the
  # same as release.yml's native rows) natively and as root, so the privileged tests also cover
  # musl's std/libc. armv7/armv5 have no native runner, but 32-bit ARM is a deployment target
  # (MikroTik), so those lanes run the shipped musl configuration under QEMU rather than only
  # cross-building it -- catching pointer-width / alignment / cast bugs the 64-bit lanes can't.
  # There lld cross-links (the same config the Dockerfile uses for cross layers, no per-arch gcc)
  # and the cargo target runner executes via qemu-arm (armv7 = armhf, hard-float; armv5 =
  # armel, soft-float, the EN7562 boxes).
  test:
    name: Test (${{ matrix.target.name }}, ${{ matrix.profile.name }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Both profiles: the shipped binary is release (overflow checks off, debug_assert! compiled
        # out, LTO) while debug keeps them on, so a test can pass under one and not the other.
        profile:
          - { name: debug, flags: '' }
          - { name: release, flags: '--release' }
        # triple '' = the runner's native gnu toolchain; a triple without `emulated` is that musl
        # target built and run natively; `emulated` lanes cross-link and run under qemu-arm.
        target:
          - { name: linux-amd64-glibc, runner: ubuntu-24.04, triple: '' }
          - { name: linux-arm64-glibc, runner: ubuntu-24.04-arm, triple: '' }
          - { name: linux-amd64-musl, runner: ubuntu-24.04, triple: x86_64-unknown-linux-musl }
          - { name: linux-arm64-musl, runner: ubuntu-24.04-arm, triple: aarch64-unknown-linux-musl }
          - { name: linux-armv7-musl, runner: ubuntu-24.04, triple: armv7-unknown-linux-musleabihf, emulated: true }
          - { name: linux-armv5-musl, runner: ubuntu-24.04, triple: armv5te-unknown-linux-musleabi, emulated: true }
          - { name: macos-arm64, runner: macos-15, triple: '' }
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ matrix.target.name }}-${{ matrix.profile.name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target.name }}-${{ matrix.profile.name }}-
      - name: Install lld + QEMU user-mode
        if: matrix.target.emulated
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends lld qemu-user-binfmt
      - name: Add the Rust target
        if: matrix.target.triple != ''
        run: rustup target add ${{ matrix.target.triple }}
      # Link the arm32 musl target with lld (cross-capable, unlike the host gcc) and run the test
      # binary under QEMU -- the same lld config the Dockerfile writes for cross layers, plus a
      # qemu-arm runner for the target. The cfg(target_env = "musl") scope leaves host
      # build-scripts/proc-macros on the default linker. The native musl lanes write no config at
      # all: rustc's default toolchain links them, exactly like the release rows.
      - name: Configure the cross linker and QEMU runner
        if: matrix.target.emulated
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.'cfg(target_env = "musl")']
          linker = "ld.lld"
          rustflags = ["-C", "linker-flavor=ld.lld"]

          [target.${{ matrix.target.triple }}]
          runner = "qemu-arm"
          EOF
      - name: Show toolchain
        run: rustc -V && cargo -V
      # The native lanes run the whole suite as root so the privileged tests (interface pairs,
      # BPF/AF_PACKET captures, joins) run instead of skipping -- like the FreeBSD VM suite, which
      # is root already. The qemu lanes stay unprivileged: their datapath-under-emulation coverage
      # lives in the native e2e lanes, and they double as the guard that the suite still runs (and
      # skips its privileged tests) without root, the way contributors run it.
      - name: cargo test (root)
        if: ${{ !matrix.target.emulated }}
        run: |
          # Not -E: sudo-rs (the default sudo since Ubuntu 25.10) ignores it. HOME is where the
          # rustup shim finds the toolchain, and the only variable the suite needs.
          triple='${{ matrix.target.triple }}'
          sudo --preserve-env=HOME "$(command -v cargo)" test --locked ${{ matrix.profile.flags }} ${triple:+--target "$triple"}
      - name: cargo test (under QEMU)
        if: matrix.target.emulated
        run: cargo test --locked --target ${{ matrix.target.triple }} ${{ matrix.profile.flags }}

  # The unit suite under Valgrind memcheck. The valgrind-e2e job below only ever sees the daemon's
  # datapath; the unit suite is where the unsafe surface actually executes -- the netlink walk
  # arithmetic, sockaddr conversions, StreamBuffer's unsafe commit, MaybeUninit buffers, the
  # hostile-input parser tests -- and an invalid read there can pass natively (the byte over-read
  # is usually still allocated) while memcheck flags it. glibc only: valgrind and static musl
  # don't mix (the Dockerfile's valgrind stage records the same constraint). Debug profile for
  # assertions and symbols; root so the privileged tests run under memcheck too; the target
  # runner wraps every test binary. Flags differ from valgrind-e2e in one place: "possible" is
  # not an error here, because libtest's mpmc machinery leaves the main thread's Thread handle
  # possibly-lost in TLS at exit (std bookkeeping, verified by backtrace) -- the daemon has no
  # harness, so the e2e lane keeps the stricter set. "reachable" stays allowed in both:
  # process-lifetime statics live to exit by design.
  valgrind-test:
    name: Valgrind test
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-valgrind-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-valgrind-test-
      - name: Install valgrind
        run: |
          # A failing third-party repo (packages.microsoft.com flakes) must not kill the step:
          # the packages come from the Ubuntu archive, and a broken archive still fails the
          # install below loudly.
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends valgrind
      - name: Show toolchain
        run: rustc -V && cargo -V && valgrind --version
      - name: cargo test (under memcheck)
        run: |
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER='valgrind --leak-check=full --show-leak-kinds=all --errors-for-leak-kinds=definite,indirect --track-fds=yes --num-callers=30 --error-exitcode=1'
          sudo --preserve-env=HOME,CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER "$(command -v cargo)" test --locked

  # The FreeBSD port pins every byte it builds from: the release tarball and all 20 crates, each with a
  # SHA256 in distinfo. If Cargo.lock moves and those are not regenerated, the port either fails to build
  # (a crate it has never heard of) or builds something other than what we released. Cargo.lock already
  # carries the SHA256 of every .crate file, so this needs no network and no FreeBSD: it is seconds.
  #
  # It compares against the lockfile AT THE TAG the port declares, not the working tree: main's version is
  # bumped to the next patch the moment a release is cut, so comparing against main would fail forever
  # after. That is also why this needs the tags (fetch-depth 0).
  freebsd-port-check:
    name: Port in sync with Cargo.lock
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Port matches the lockfile of the release it builds
        run: ci/port-sync.py --check

  # clippy + the rustdoc intra-link gate, per supported target. clippy/build/doc only analyze the code active
  # for the *target* platform, so each cfg(target_os) backend must be linted under its own --target. Both are
  # check-only (no link), so every target runs on one Linux runner with just `rustup target add` -- no
  # macOS/FreeBSD host, no cross-linker, no QEMU (the same mechanism as the `cargo check --target
  # x86_64-unknown-freebsd` gate). Every shipped target is linted, not one per OS: the source has no
  # target_arch cfgs, but libc/usize widths differ, so the 32- and 64-bit checks aren't redundant.
  # (aarch64-unknown-freebsd is tier 3 -- no rustup std -- and is the same 64-bit-LE code as the amd64
  # FreeBSD lane, which covers it.) The Cargo.toml [lints.rustdoc] denies make `cargo doc` the link gate.
  lint:
    name: Lint (${{ matrix.target }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - armv5te-unknown-linux-musleabi
          - x86_64-unknown-freebsd
          - aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-lint-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-lint-${{ matrix.target }}-
      - name: Add the Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Show toolchain
        run: rustc -V && cargo -V && cargo clippy -V
      - name: clippy
        run: cargo clippy --locked --target ${{ matrix.target }} --all-targets -- -D warnings
      - name: rustdoc (intra-doc link gate)
        run: cargo doc --locked --target ${{ matrix.target }} --no-deps --document-private-items

  # rustfmt is target-independent, so run it once.
  fmt:
    name: Format
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result != 'success' || needs.gate.outputs.run == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: rustfmt
        run: cargo fmt --check

  # A single aggregate status check: green only when every job above is green (or was legitimately skipped
  # by `gate` because this tree already passed CI). Make THIS the sole required check in branch protection --
  # then adding, renaming, or removing a job never means editing the required-checks list; its `needs` below
  # is the one place that set is maintained. `if: !cancelled()` forces it to run even when upstream jobs were
  # skipped (a skipped dependency would otherwise skip this job too); the failure step then treats only real
  # failures / cancellations as fatal, so a gate-driven skip still passes.
  success:
    name: Success
    if: ${{ !cancelled() }}
    needs: [gate, fmt, lint, test, freebsd-tests, docker-e2e, native-e2e, freebsd-native-e2e, miri, freebsd-port-check, freebsd-port-build, valgrind-test, valgrind-e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Report upstream results
        run: |
          echo "Upstream job results: ${{ join(needs.*.result, ', ') }}"
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required jobs failed or were cancelled."
          exit 1
