name: Release

# Cutting a release is just pushing a v* tag (see release.sh): this gates on CI, builds the per-arch
# binaries, publishes the multi-arch image to GHCR, and creates the GitHub release with assets attached.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # A version tag must match the [package] version in Cargo.toml, so the git tag, the published image,
  # and the GitHub release name can never disagree. Fails within a minute while verify-ci still waits.
  tag-check:
    name: Tag matches Cargo.toml
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Verify tag matches Cargo.toml version
        run: |
          version="$(./version.sh)"
          expected="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version (expected ${expected}). Bump Cargo.toml or retag."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches Cargo.toml version ${version}."

  # Gate the release on ci.yml being green for this commit (poll it, waiting if the tag was pushed
  # before CI finished).
  verify-ci:
    permissions:
      actions: read
    uses: ./.github/workflows/verify-ci.yml

  # Downloadable binaries, built with rustc's default toolchain wherever one exists: amd64 and
  # arm64 are static musl on their native runners (the self-contained default, gcc-driven link),
  # macOS native dynamic (no static libSystem). armv7/armv5 have no native runner, so they
  # cross-compile on the amd64 runner with lld; both FreeBSD arches likewise (clang+lld against a
  # base.txz sysroot -- the exact configurations CI's freebsd lanes build AND run on every PR;
  # freebsd-arm64 on the pinned nightly from ci/freebsd-nightly.env until stable 1.98 ships its std).
  binaries:
    name: Binary (${{ matrix.variant }})
    needs: [tag-check, verify-ci]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - variant: linux-amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - variant: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - variant: linux-armv7
            runner: ubuntu-24.04
            target: armv7-unknown-linux-musleabihf
          - variant: linux-armv5
            runner: ubuntu-24.04
            target: armv5te-unknown-linux-musleabi
          - variant: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
          - variant: freebsd-amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-freebsd
            freebsd_arch: amd64
          - variant: freebsd-arm64
            runner: ubuntu-24.04
            target: aarch64-unknown-freebsd
            freebsd_arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # A failing third-party repo (packages.microsoft.com flakes) must not kill a release
      # build; the packages come from the Ubuntu archive, and a broken archive still fails
      # the installs below loudly.
      - name: Install lld (arm32 cross-linker)
        if: contains(matrix.target, 'armv')
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends lld

      - name: Install clang + lld (FreeBSD cross-link)
        if: contains(matrix.target, 'freebsd')
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends clang lld

      # aarch64-unknown-freebsd has no stable dist until 1.98: that row installs the pinned dated
      # nightly from ci/freebsd-nightly.env, and the build picks it up via the FREEBSD_TOOLCHAIN selector.
      - name: Add the Rust target
        run: |
          if [ '${{ matrix.target }}' = aarch64-unknown-freebsd ]; then
            . ci/freebsd-nightly.env
            rustup toolchain install "nightly-${RUST_NIGHTLY}" --profile minimal
            rustup target add --toolchain "nightly-${RUST_NIGHTLY}" aarch64-unknown-freebsd
            echo "FREEBSD_TOOLCHAIN=+nightly-${RUST_NIGHTLY}" >> "$GITHUB_ENV"
          else
            rustup target add ${{ matrix.target }}
          fi

      # Link the arm32 musl targets with lld (cross-capable, unlike the host gcc) -- the same config
      # the Dockerfile writes for its cross layers. cfg(target_env = "musl") leaves host
      # build-scripts/proc-macros on the default linker; amd64/arm64 musl build natively with no
      # config at all (rustc's default).
      - name: Configure the arm32 cross-linker
        if: contains(matrix.target, 'armv')
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.'cfg(target_env = "musl")']
          linker = "ld.lld"
          rustflags = ["-C", "linker-flavor=ld.lld"]
          EOF

      # Cross-link through the sysroot's clang wrapper, +crt-static scoped to the target (host
      # proc-macros stay on the default linker) -- handed to the later steps via GITHUB_ENV so
      # only these rows ever see it.
      - name: FreeBSD link sysroot
        if: contains(matrix.target, 'freebsd')
        env:
          FREEBSD_SYSROOT_ARCH: ${{ matrix.freebsd_arch }}
          # The shipped static assets link against the oldest supported major, so they run on
          # every newer release ("14.4 or newer" in the README). This moves when the floor moves.
          FREEBSD_SYSROOT_VERSION: 14
        run: |
          ci/freebsd-sysroot.sh
          prefix="CARGO_TARGET_$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')"
          {
            echo "${prefix}_LINKER=$HOME/freebsd-sysroot/bin/freebsd-clang"
            echo "${prefix}_RUSTFLAGS=-C target-feature=+crt-static"
          } >> "$GITHUB_ENV"

      - name: Show toolchain
        run: rustc ${FREEBSD_TOOLCHAIN:-} -V && cargo ${FREEBSD_TOOLCHAIN:-} -V

      - name: Build release binary
        run: cargo ${FREEBSD_TOOLCHAIN:-} build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/netflector" "dist/netflector-${{ github.ref_name }}-${{ matrix.variant }}"

      - name: Verify static linking (Linux)
        if: runner.os == 'Linux'
        run: |
          bin="dist/netflector-${{ github.ref_name }}-${{ matrix.variant }}"
          file "$bin"
          # The static binary has no shared-library deps (the invariant that matters), but PIE-ness
          # varies -- musl x86_64 is static-pie, the ARM targets and FreeBSD are plain static -- so
          # accept either "statically linked" or "static-pie linked"; only a dynamic binary fails.
          file "$bin" | grep -qE 'statically linked|static-pie linked' \
            || { echo "::error::binary is not statically/static-pie linked"; exit 1; }

      - name: Verify system-only linking (macOS)
        if: runner.os == 'macOS'
        run: |
          bin="dist/netflector-${{ github.ref_name }}-${{ matrix.variant }}"
          otool -L "$bin"
          # macOS has no static linking; the invariant that matters is the same one the Linux
          # check enforces: no dependencies beyond the OS (nothing from Homebrew or the
          # toolchain). A stock build wants libSystem and libiconv, both under /usr/lib.
          bad=$(otool -L "$bin" | tail -n +2 | awk '{print $1}' | grep -vE '^(/usr/lib/|/System/)' || true)
          [ -z "$bad" ] || { echo "::error::binary links non-system libraries: $bad"; exit 1; }

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: netflector-${{ matrix.variant }}
          path: dist/netflector-${{ github.ref_name }}-${{ matrix.variant }}
          if-no-files-found: error

  # Each image arch builds on its own runner and pushes by digest; the manifest job stitches the
  # digests into one multi-arch tag. Native runners for amd64/arm64 mean those layers link with
  # rustc's default toolchain -- the Dockerfile writes its lld config only for cross builds, i.e.
  # the arm32 pair, which have no native runner and cross-compile on the amd64 host (no QEMU).
  image:
    name: Image (${{ matrix.arch }})
    needs: [tag-check, verify-ci]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: armv7
            runner: ubuntu-24.04
            platform: linux/arm/v7
          - arch: armv5
            runner: ubuntu-24.04
            platform: linux/arm/v5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The cache scopes are shared with the docker-e2e lanes, so a release build reuses layers
      # CI already built for this commit.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}.digest"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*.digest
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Image manifest -> GHCR
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      latest: ${{ steps.ord.outputs.latest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-tags: true

      # Everything else in a release is per-tag, but `latest` and the
      # major.minor image tag are shared state: only the run for the newest
      # tag (of the repo, and of its patch line) may move them, or an older
      # run finishing late drags them backwards. A concurrency group would
      # not do: it holds one pending run at most, so a third tag pushed
      # while one builds silently cancels the second's release.
      - name: Which shared tags may move
        id: ord
        run: |
          newest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          line=$(git tag --list "${GITHUB_REF_NAME%.*}.*" --sort=-v:refname | head -1)
          echo "latest=$([ "$GITHUB_REF_NAME" = "$newest" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "minor=$([ "$GITHUB_REF_NAME" = "$line" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.ord.outputs.minor }}
            type=raw,value=latest,enable=${{ steps.ord.outputs.latest }}
          # The default latest=auto emits :latest from the {{version}} entry,
          # bypassing the gate on the raw entry above.
          flavor: |
            latest=false

      - name: Create and push the manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          METADATA: ${{ steps.meta.outputs.json }}
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$METADATA")
          args=()
          for tag in "${tags[@]}"; do args+=(--tag "$tag"); done
          for f in *.digest; do args+=("${IMAGE}@sha256:${f%.digest}"); done
          docker buildx imagetools create "${args[@]}"

      - name: Inspect
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"

  release:
    name: GitHub release
    needs: [binaries, manifest]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: netflector-*
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum netflector-* | tee SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            dist/netflector-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
          # The API default (true for new releases) would let an old tag's run
          # finishing late steal the Latest marker; same predicate as :latest.
          make_latest: ${{ needs.manifest.outputs.latest }}
