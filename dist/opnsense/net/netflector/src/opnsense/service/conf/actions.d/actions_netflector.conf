[start]
command:service netflector start
type:script
message:starting netflector

[stop]
command:service netflector stop
type:script
message:stopping netflector

[restart]
command:service netflector restart
type:script
message:restarting netflector

[status]
command:service netflector status; true
type:script_output
message:netflector status

; Validates what the plugin WOULD generate, rendered into a throwaway root, so that checking a
; configuration never rewrites the one a restart would load. See the script for why that matters.
[check]
command:/usr/local/opnsense/scripts/netflector/check.py
type:script_output
message:validating the netflector configuration
